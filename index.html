<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="NomadCal"/>
  <meta name="description" content="Calendrier pro nomade"/>
  <title>NomadCal</title>
  <style>
    @font-face {
      font-family: 'Phenomena';
      src: url('/Phenomena-Bold.ttf') format('truetype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'Phenomena';
      src: url('/Phenomena-Regular.ttf') format('truetype');
      font-weight: 400;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; overflow: hidden; }
    body { background: #fdf8f0; font-family: 'Phenomena', 'Nunito', sans-serif; }
  </style>
  <script>
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/sw.js')
        .then(reg => {
          reg.update();
          reg.addEventListener('updatefound', () => {
            const sw = reg.installing;
            sw.addEventListener('statechange', () => {
              if(sw.state === 'activated') window.location.reload();
            });
          });
        });
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
